<style>
  @font-face {
    font-family: 'Satoshi';
    src: url('/fonts/satoshi/Satoshi-Variable.woff2') format('woff2');
    font-weight: 300 900; font-display: swap; font-style: normal;
  }
  @font-face {
    font-family: 'Satoshi';
    src: url('/fonts/satoshi/Satoshi-VariableItalic.woff2') format('woff2');
    font-weight: 300 900; font-display: swap; font-style: italic;
  }

  :root {
    --bg: #0A0A0A;
    --surface: #111111;
    --border: #1E1E1E;
    --text: #E8E4DF;
    --text-dim: #7A7A7A;
    --accent: #E5A54B;
    --accent-dim: rgba(229, 165, 75, 0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Satoshi', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --mark: 'Patrick Hand', cursive;
    --space-3: 8px;
    --space-4: 12px;
    --space-5: 16px;
    --space-6: 24px;
    --space-7: 32px;
    --space-8: 48px;
    --space-9: 64px;
    --radius-sm: 4px;
    --radius-md: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  .page {
    position: relative;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    max-width: 1040px;
    margin: 0 auto;
    padding: clamp(var(--space-7), 8vw, var(--space-9)) clamp(var(--space-6), 5vw, var(--space-8));
  }

  /* aa. mark — stroke-draw on load */
  .aa-mark {
    position: absolute;
    top: clamp(var(--space-6), 5vw, var(--space-8));
    left: clamp(var(--space-6), 5vw, var(--space-8));
    text-decoration: none;
    display: inline-block;
    line-height: 1;
  }
  .aa-mark svg { overflow: visible; display: block; }

  /* Greeting line — warm, small, cycles through translations */
  .greeting-line {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-bottom: var(--space-6);
    height: 1em;
    min-width: 120px;
  }
  .greeting-line .dot { color: var(--accent); }

  /* Hero block */
  .hero { max-width: 720px; width: 100%; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: var(--space-5);
  }
  .hero h1 {
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.02;
    margin-bottom: var(--space-5);
  }
  .hero h1 .accent { color: var(--accent); }
  .hero .subhead {
    font-size: clamp(1rem, 1.6vw, 1.1rem);
    color: var(--text);
    opacity: 0.82;
    font-weight: 400;
    max-width: 620px;
    line-height: 1.55;
    margin-bottom: var(--space-7);
  }

  /* CTAs */
  .actions {
    display: flex;
    gap: var(--space-4);
    flex-wrap: wrap;
  }
  .btn {
    display: inline-block;
    padding: 11px 20px;
    font-family: var(--mono);
    font-size: 0.82rem;
    font-weight: 500;
    text-decoration: none;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
    border: 1px solid transparent;
    cursor: pointer;
    letter-spacing: 0.01em;
  }
  .btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn-primary:hover { background: #f0b75a; border-color: #f0b75a; }
  .btn-secondary { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* Logo strip — muted bottom band */
  .logo-strip {
    position: absolute;
    bottom: clamp(var(--space-6), 4vw, var(--space-8));
    left: clamp(var(--space-6), 5vw, var(--space-8));
    right: clamp(var(--space-6), 5vw, var(--space-8));
    display: flex;
    align-items: center;
    gap: var(--space-6);
    flex-wrap: wrap;
    max-width: 1040px;
    margin: 0 auto;
  }
  .logo-strip-logos {
    display: flex;
    gap: var(--space-6);
    flex-wrap: wrap;
    align-items: center;
  }
  .logo-strip img {
    height: 18px;
    width: auto;
    opacity: 0.55;
    filter: grayscale(1) brightness(1.15);
    transition: opacity 0.2s, filter 0.2s;
  }
  .logo-strip img:hover {
    opacity: 0.95;
    filter: grayscale(0) brightness(1);
  }

  /* Mobile */
  @media (max-width: 640px) {
    .page {
      padding-top: calc(var(--space-9) + var(--space-6));
      padding-bottom: calc(var(--space-9) * 2);
      justify-content: flex-start;
    }
    .actions { flex-direction: column; align-items: stretch; }
    .btn { text-align: center; }
    .logo-strip { flex-direction: column; align-items: flex-start; gap: var(--space-4); }
    .logo-strip-logos { gap: var(--space-5); }
    .logo-strip img { height: 16px; }
  }

  @media (max-width: 380px) {
    .hero h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- aa. mark, stroke-draw on load -->
  <a href="/" class="aa-mark" aria-label="agamarora.com">
    <svg id="aa-mark" width="68" height="34" viewBox="0 0 72 36">
      <text id="aa-stroke" x="2" y="28" fill="none" stroke="#E8E4DF" stroke-width="0.8" font-family="Patrick Hand" font-size="28">aa</text>
      <text id="dot-fill" x="0" y="28" fill="#E5A54B" opacity="0" font-family="Patrick Hand" font-size="28">.</text>

    </svg>

  <!-- Hero -->

    </p>
    <div class="actions">
      <a href="/enter" class="btn btn-primary">Talk to my AI &rarr;</a>

      <img src="/assets/logos/absolutdata-dark.webp" alt="AbsolutData">
      <img src="/assets/logos/aroma-magic-dark.webp" alt="Aroma Magic">
      <img src="/assets/logos/v2g-dark.webp" alt="V2 Games">
    </div>
  </div>

</div>

<script>
// aa. mark stroke-draw animation (ported from /enter)
(function() {
  const s = document.getElementById('aa-stroke');
  const f = document.getElementById('aa-fill');
  const d = document.getElementById('dot-fill');
  if (!s || !f || !d) return;
  document.fonts.ready.then(() => {
    const len = s.getComputedTextLength();
    d.setAttribute('x', 4 + len - 2);
    f.setAttribute('x', 4);
    const dl = len * 2;
    s.style.strokeDasharray = dl;
    s.style.strokeDashoffset = dl;
    s.style.opacity = '1';
    s.getBoundingClientRect();
    s.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(0.25,0.1,0.25,1)';
    s.style.strokeDashoffset = '0';
    s.addEventListener('transitionend', function h(e) {
      if (e.propertyName !== 'stroke-dashoffset') return;
      s.removeEventListener('transitionend', h);
      f.style.transition = 'opacity 0.2s'; f.style.opacity = '1';
      d.style.transition = 'opacity 0.2s'; d.style.opacity = '1';
      s.style.transition = 'opacity 0.25s ease 0.05s'; s.style.opacity = '0';
    });
  });
})();

// Greeting cycle — typewriter in + delete, rotating translations
(function() {
  const el = document.getElementById('greeting');
  if (!el) return;
  const greetings = ['Hello', 'Hola', 'Bonjour', 'नमस्ते', 'こんにちは', '안녕하세요', 'Shalom'];
  let wordIdx = 0;
  let charIdx = 0;
  let deleting = false;

  function tick() {
    const word = greetings[wordIdx];
    if (!deleting) {
      charIdx++;
      el.textContent = word.slice(0, charIdx);
      if (charIdx >= word.length) {
        deleting = true;
        setTimeout(tick, 1800);
        return;
      }
      setTimeout(tick, 90);
    } else {
      charIdx--;
      el.textContent = word.slice(0, charIdx);
      if (charIdx <= 0) {
        deleting = false;
        wordIdx = (wordIdx + 1) % greetings.length;
        setTimeout(tick, 400);
        return;
      }
      setTimeout(tick, 40);
    }
  }

  el.textContent = '';
  setTimeout(tick, 300);
})();
</script>
