# agamarora.com — Netlify config
# Caching strategy: HTML always fresh, static assets cached aggressively.
# Redirects: /explore is being retired; send visitors to /lab instead.

[build]
  publish = "."

# Redirect retired /explore page to /lab (the actual project showcase).
# 301 for SEO consolidation.
[[redirects]]
  from = "/explore"
  to = "/lab/"
  status = 301
  force = true

[[redirects]]
  from = "/explore/*"
  to = "/lab/"
  status = 301
  force = true

# Security headers: applied to every response.
# HSTS skips `preload` for now (preload list is a permanent commitment).
# CSP allows inline style/script (site has no build step, every page is self-contained),
# img data: (favicons + inline SVG sprites), YouTube embed on /lab/.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.youtube.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com; font-src 'self'; connect-src 'self'; frame-src https://www.youtube.com https://www.youtube-nocookie.com; base-uri 'self'; form-action 'self'; object-src 'none'"

# HTML: always revalidate, never cache long.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets: cache hard. Bust by renaming on change.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
